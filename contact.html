<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Page</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="contact-page">
    <h1>Contact Page</h1>

    <section class="contact-card">
      <h2>Tel</h2>
      <p>+1 (555) 123-4567</p>
    </section>

    <section class="contact-card">
      <h2>Fax</h2>
      <p>+1 (555) 987-6543</p>
    </section>

    <section class="contact-card">
      <h2>Email</h2>
      <p><a href="mailto:hello@example.com">hello@example.com</a></p>
    </section>

    <section class="contact-card">
      <h2>Social Media</h2>
      <div class="social-links">
        <a class="social-btn" href="https://facebook.com" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
          <span class="icon" aria-hidden="true">📘</span>
          <span>Facebook</span>
        </a>
        <a class="social-btn" href="https://x.com" target="_blank" rel="noopener noreferrer" aria-label="X">
          <span class="icon" aria-hidden="true">🐦</span>
          <span>X</span>
        </a>
        <a class="social-btn" href="https://instagram.com" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <span class="icon" aria-hidden="true">📸</span>
          <span>Instagram</span>
        </a>
        <a class="social-btn" href="https://linkedin.com" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
          <span class="icon" aria-hidden="true">💼</span>
          <span>LinkedIn</span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
